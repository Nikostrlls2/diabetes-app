<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="description"
      content="GlucoPilot helps people with type 1 diabetes track carbs, save foods, get reminders, and ask an AI coach."
    />
    <meta name="theme-color" content="#0d7a74" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="GlucoPilot" />
    <link rel="apple-touch-icon" href="./logo-192.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/x-icon" href="./logo.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top, rgba(13, 122, 116, 0.15), transparent 32%),
          linear-gradient(180deg, #f6f1e8, #efe7dc);
      }

      html:not(.app-ready) #root {
        opacity: 0;
      }

      #boot-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        padding: 1.25rem;
        background:
          radial-gradient(circle at top, rgba(13, 122, 116, 0.16), transparent 28%),
          linear-gradient(180deg, #f6f1e8, #efe7dc);
        transition:
          opacity 240ms ease,
          visibility 240ms ease;
      }

      #boot-screen.is-hidden {
        opacity: 0;
        visibility: hidden;
      }

      .boot-card {
        display: grid;
        justify-items: center;
        gap: 0.95rem;
        width: min(22rem, 100%);
        padding: 1.5rem;
        border: 1px solid rgba(21, 49, 63, 0.08);
        border-radius: 28px;
        background: rgba(255, 251, 244, 0.92);
        box-shadow: 0 24px 60px rgba(21, 49, 63, 0.1);
        text-align: center;
      }

      .boot-logo {
        width: 5.25rem;
        height: 5.25rem;
        border-radius: 24px;
        object-fit: cover;
        box-shadow: 0 16px 32px rgba(13, 122, 116, 0.16);
      }

      .boot-card h1 {
        margin: 0;
        color: #15313f;
        font-family: Georgia, serif;
        font-size: clamp(2rem, 5vw, 2.6rem);
        letter-spacing: -0.04em;
      }

      .boot-card p {
        margin: 0;
        color: #5a6d78;
        line-height: 1.5;
      }

      .boot-spinner {
        width: 2.8rem;
        height: 2.8rem;
        border: 0.24rem solid rgba(13, 122, 116, 0.16);
        border-top-color: #0d7a74;
        border-radius: 999px;
        animation: boot-spin 850ms linear infinite;
      }

      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .boot-spinner {
          animation: none;
        }

        #boot-screen {
          transition: none;
        }
      }
    </style>
    <title>GlucoPilot</title>
  </head>
  <body>
    <div id="boot-screen" aria-hidden="true">
      <div class="boot-card">
        <img class="boot-logo" src="./logo-192.png" alt="GlucoPilot logo" />
        <div class="boot-spinner"></div>
        <h1>GlucoPilot</h1>
        <p>Loading your foods, reminders, reports, and AI coach.</p>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
